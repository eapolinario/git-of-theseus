name: Build and run

on:
  push:
    branches:
      - master
  pull_request:

env:
  DISPLAY: ":99.0"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    name: Tests on Python ${{ matrix.python-version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install .

      - name: Run tests
        run: |
          git-of-theseus-analyze . --outdir got
          git-of-theseus-stack-plot got/cohorts.json
          git-of-theseus-stack-plot got/cohorts.json --normalize
          git-of-theseus-stack-plot got/exts.json
          git-of-theseus-stack-plot got/authors.json
          git-of-theseus-line-plot got/authors.json
          git-of-theseus-line-plot got/dirs.json
          git-of-theseus-survival-plot got/survival.json --exp-fit
          git-of-theseus-analyze --help
          git-of-theseus-stack-plot --help
          git-of-theseus-survival-plot --help

  test-docker:
    runs-on: ubuntu-latest
    name: Build and test Docker image
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Build Docker image
        run: docker build -t git-of-theseus .

      - name: Test Docker image
        run: |
          docker run --rm \
            -e MPLBACKEND=Agg \
            -v "$PWD:/repo:ro" \
            git-of-theseus \
            bash -c "
              git config --global --add safe.directory /repo &&
              git-of-theseus-analyze /repo --outdir /tmp/got &&
              git-of-theseus-stack-plot /tmp/got/cohorts.json &&
              git-of-theseus-stack-plot /tmp/got/cohorts.json --normalize &&
              git-of-theseus-stack-plot /tmp/got/exts.json &&
              git-of-theseus-stack-plot /tmp/got/authors.json &&
              git-of-theseus-line-plot /tmp/got/authors.json &&
              git-of-theseus-line-plot /tmp/got/dirs.json &&
              git-of-theseus-survival-plot /tmp/got/survival.json --exp-fit &&
              git-of-theseus-analyze --help &&
              git-of-theseus-stack-plot --help &&
              git-of-theseus-survival-plot --help
            "

  test-nix:
    runs-on: ubuntu-latest
    name: Build and test via Nix
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build package with nix
        run: nix build

      - name: Run tests in Nix dev shell
        run: nix develop --command just test

  test-rust:
    runs-on: ubuntu-latest
    name: Build and test Rust port
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies (fontconfig, freetype)
        run: sudo apt-get update -qq && sudo apt-get install -y libfontconfig1-dev libfreetype6-dev

      - name: Cache cargo registry / build
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked

      - name: cargo build --release
        run: cargo build --workspace --release --locked

      - name: Run analyzer against this repo
        run: |
          mkdir -p got-rs
          ./target/release/git-of-theseus-analyze-rs --quiet --outdir got-rs .
          # Sanity-check JSON shape.
          python3 - <<'PY'
          import json
          for fn in ['cohorts.json','exts.json','authors.json','dirs.json','domains.json']:
              d = json.load(open(f'got-rs/{fn}'))
              assert set(d.keys()) == {'y','ts','labels'}, fn
              assert len(d['labels']) == len(d['y']), fn
              n = len(d['ts'])
              assert all(len(s) == n for s in d['y']), fn
          json.load(open('got-rs/survival.json'))
          print('json ok')
          PY

      - name: Verify Python plot scripts can consume Rust JSON
        run: |
          pip install .
          export MPLBACKEND=Agg
          git-of-theseus-stack-plot got-rs/cohorts.json --outfile got-rs/cohorts.png
          git-of-theseus-line-plot got-rs/authors.json --outfile got-rs/authors.png
          git-of-theseus-survival-plot got-rs/survival.json --exp-fit --outfile got-rs/survival.png
